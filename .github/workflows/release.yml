name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: citect-tracker-windows
            binary: dist/citect-tracker.exe
          - os: ubuntu-latest
            artifact: citect-tracker-linux
            binary: dist/citect-tracker

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install -e .[build]

      - name: Build executable
        run: pyinstaller citect-tracker.spec --noconfirm

      - name: Verify build
        shell: bash
        run: |
          if [ -f "${{ matrix.binary }}" ]; then
            echo "Build successful!"
            ls -lh "${{ matrix.binary }}"
          else
            echo "Build failed - executable not found"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/citect-tracker-windows/citect-tracker.exe
            artifacts/citect-tracker-linux/citect-tracker
          generate_release_notes: true
